<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sem conexao</title>
  <meta name="theme-color" content="#0f172a">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, sans-serif;
      background: #000000;
      color: #f5f5f5;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 440px;
      background: #0a0a0a;
      border: 1px solid #242424;
      border-radius: 16px;
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.08);
      padding: 20px;
    }
    h1 { margin: 0 0 10px; font-size: 1.35rem; }
    p { margin: 0; color: #b0b0b0; line-height: 1.5; }
    a {
      display: inline-block;
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #22518f;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Voce esta offline</h1>
    <p>Verifique sua conexao para resolver links. A interface continua disponivel para consulta local.</p>
    <a href="/">Tentar novamente</a>
  </div>
</body>
</html>
