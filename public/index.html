<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unshortener — Descubra o Link Real</title>
  <meta name="description" content="Cole qualquer link encurtado e descubra o destino final. Rápido, seguro e sem precisar clicar no link.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Animated background particles -->
  <div class="bg-particles" id="bg-particles"></div>

  <main class="container">
    <!-- Hero Section -->
    <header class="hero">
      <div class="logo">
        <div class="logo-icon">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 4L24 8L16 16L8 8L12 4L20 12L28 4L32 8L24 16L32 24L28 28L20 20L12 28L8 24L16 16L8 8" 
                  stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 20C6 12.268 12.268 6 20 6" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M34 20C34 27.732 27.732 34 20 34" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="3" fill="url(#grad1)"/>
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40">
                <stop stop-color="#6366f1"/>
                <stop offset="1" stop-color="#a855f7"/>
              </linearGradient>
              <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40">
                <stop stop-color="#a855f7"/>
                <stop offset="1" stop-color="#ec4899"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <span class="logo-text">Unshortener</span>
      </div>
      <h1 class="hero-title">
        Descubra o <span class="gradient-text">Link Real</span>
      </h1>
      <p class="hero-subtitle">
        Cole qualquer link encurtado e veja para onde ele realmente leva. Sem cliques arriscados, sem surpresas.
      </p>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <div class="input-wrapper" id="input-wrapper">
        <div class="input-glow"></div>
        <div class="input-inner">
          <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <input 
            type="url" 
            id="url-input" 
            placeholder="Cole o link encurtado aqui... (ex: bit.ly/abc123)"
            autocomplete="off"
            spellcheck="false"
          >
          <button id="resolve-btn" onclick="resolveUrl()">
            <span class="btn-text">Resolver</span>
            <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14"/>
              <path d="M12 5l7 7-7 7"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="quick-examples">
        <span class="example-label">Teste com:</span>
        <button class="example-chip" onclick="fillExample('https://bit.ly/3YhK2Ql')">bit.ly</button>
        <button class="example-chip" onclick="fillExample('https://tinyurl.com/2s3jkw5r')">tinyurl</button>
        <button class="example-chip" onclick="fillExample('https://t.co/example')">t.co</button>
      </div>
    </section>

    <!-- Loading -->
    <div class="loading-section" id="loading-section">
      <div class="loading-spinner">
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
        <div class="spinner-ring"></div>
      </div>
      <p class="loading-text">Seguindo redirecionamentos...</p>
    </div>

    <!-- Error -->
    <div class="error-section" id="error-section">
      <div class="error-card">
        <div class="error-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
        </div>
        <p class="error-message" id="error-message"></p>
        <button class="error-retry" onclick="retryResolve()">Tentar novamente</button>
      </div>
    </div>

    <!-- Result Section -->
    <section class="result-section" id="result-section">
      <!-- Final URL Card -->
      <div class="result-card final-url-card">
        <div class="card-header">
          <div class="card-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
            <span>Link Final</span>
          </div>
          <div class="status-badge" id="status-badge">200</div>
        </div>
        <div class="final-url-display">
          <a href="#" id="final-url-link" target="_blank" rel="noopener noreferrer" class="final-url-text"></a>
        </div>
        <div class="card-actions">
          <button class="action-btn copy-btn" id="copy-btn" onclick="copyFinalUrl()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>Copiar</span>
          </button>
          <button class="action-btn open-btn" id="open-btn" onclick="openFinalUrl()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
              <polyline points="15 3 21 3 21 9"/>
              <line x1="10" y1="14" x2="21" y2="3"/>
            </svg>
            <span>Abrir</span>
          </button>
        </div>
      </div>

      <!-- Redirect Chain Card -->
      <div class="result-card chain-card">
        <div class="card-header">
          <div class="card-badge chain-badge">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"/>
              <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/>
              <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
            <span>Cadeia de Redirecionamentos</span>
          </div>
          <span class="chain-count" id="chain-count"></span>
        </div>
        <div class="chain-timeline" id="chain-timeline">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>Feito com <span class="heart">♥</span> para sua segurança online</p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
